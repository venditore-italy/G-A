<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>G A - Home</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Arial', sans-serif;
      background: url('https://images.unsplash.com/photo-1542060748-10c28b62716c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
      background-size: cover;
      color: white;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.7);
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 1s ease-out;
    }

    h1 {
      font-size: 5rem;
      margin-bottom: 1rem;
      letter-spacing: 5px;
      font-weight: 900;
      text-transform: uppercase;
    }

    p {
      font-size: 1.8rem;
      color: #ddd;
      margin-bottom: 2rem;
    }

    a {
      text-decoration: none;
      padding: 1.2rem 2.5rem;
      background: white;
      color: black;
      font-size: 1.4rem;
      font-weight: bold;
      border-radius: 50px;
      transition: 0.3s ease;
      box-shadow: 0 4px 15px rgba(255,255,255,0.3);
    }

    a:hover {
      background: #ddd;
      transform: scale(1.08);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 768px) {
      h1 { font-size: 2.8rem; }
      p { font-size: 1.2rem; }
      a { font-size: 1rem; padding: 0.9rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="container">
    <h1>G A</h1>
    <p>La moda incontra il lusso – Scopri ora</p>
    <a href="prodotti.html">Scopri i prodotti</a>
  </div>
</body>
</html>
