<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Benvenuto su G A</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #0f0f0f, #1c1c1c);
      color: white;
    }
    .container {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 1s ease-out;
    }
    h1 {
      font-size: 4rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }
    p {
      font-size: 1.5rem;
      color: #aaa;
      margin-bottom: 2rem;
    }
    a {
      text-decoration: none;
      padding: 1rem 2rem;
      background: white;
      color: black;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 50px;
      transition: 0.3s ease;
    }
    a:hover {
      background: #ddd;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 768px) {
      h1 { font-size: 2.8rem; }
      p { font-size: 1.2rem; }
      a { font-size: 1rem; padding: 0.8rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><strong>G A</strong></h1>
    <p>Scopri la nostra collezione esclusiva</p>
    <a href="prodotti.html">Scopri i prodotti</a>
  </div>
</body>
</html>
