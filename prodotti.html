<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prodotti - G A</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f4f4;
    }
    .product-card {
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-radius: 8px;
    }
    .cart {
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      border: 1px solid #ccc;
      padding: 15px;
      width: 250px;
      z-index: 1000;
    }
    .cart h5 {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">G A</a>
    </div>
  </nav>

  <!-- Carrello -->
  <div class="cart" id="cart">
    <h5>🛒 Carrello</h5>
    <ul id="cart-items" class="list-unstyled mb-2"></ul>
    <strong>Totale: €<span id="cart-total">0</span></strong>
  </div>

  <!-- Prodotti -->
  <div class="container py-5">
    <h2 class="mb-4">I Nostri Prodotti</h2>
    <div class="row" id="products">

      <!-- Prodotto esempio 1 -->
      <div class="col-md-4 mb-4">
        <div class="card product-card">
          <img src="https://source.unsplash.com/400x300/?tshirt" class="card-img-top" alt="T-Shirt">
          <div class="card-body">
            <h5 class="card-title">T-Shirt G A</h5>
            <p class="card-text">€25</p>
            <button class="btn btn-primary add-to-cart" data-name="T-Shirt G A" data-price="25">Aggiungi al carrello</button>
          </div>
        </div>
      </div>

      <!-- Prodotto esempio 2 -->
      <div class="col-md-4 mb-4">
        <div class="card product-card">
          <img src="https://source.unsplash.com/400x300/?hat" class="card-img-top" alt="Cappello">
          <div class="card-body">
            <h5 class="card-title">Cappello G A</h5>
            <p class="card-text">€18</p>
            <button class="btn btn-primary add-to-cart" data-name="Cappello G A" data-price="18">Aggiungi al carrello</button>
          </div>
        </div>
      </div>

      <!-- Prodotto esempio 3 -->
      <div class="col-md-4 mb-4">
        <div class="card product-card">
          <img src="https://source.unsplash.com/400x300/?bag" class="card-img-top" alt="Borsa">
          <div class="card-body">
            <h5 class="card-title">Borsa G A</h5>
            <p class="card-text">€40</p>
            <button class="btn btn-primary add-to-cart" data-name="Borsa G A" data-price="40">Aggiungi al carrello</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const cartItems = document.getElementById('cart-items');
    const cartTotal = document.getElementById('cart-total');
    let cart = [];

    document.querySelectorAll('.add-to-cart').forEach(button => {
      button.addEventListener('click', () => {
        const name = button.getAttribute('data-name');
        const price = parseFloat(button.getAttribute('data-price'));

        cart.push({ name, price });
        updateCart();
      });
    });

    function updateCart() {
      cartItems.innerHTML = '';
      let total = 0;
      cart.forEach(item => {
        const li = document.createElement('li');
        li.textContent = ${item.name} - €${item.price};
        cartItems.appendChild(li);
        total += item.price;
      });
      cartTotal.textContent = total.toFixed(2);
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
